<!DOCTYPE html>
<html lang="en">
  {% include head.html %}

  <body class="bg-{{ page.background }} {{ page.color }} animated fadeIn">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    {{ content }}

    <footer class="site-footer center p3" aria-label="Contact links">
      <a href="mailto:{{ site.email }}" class="inline-block mr2 btn h6 py0 px1"
        >Email</a
      >
<a
        href="{{ site.twitter_username | prepend: 'https://github.com/' }}"
        class="inline-block btn h6 py0 px1"
        rel="noopener noreferrer"
        >Github</a
      >
      <a
        href="https://www.linkedin.com/in/borisrorsvort"
        class="inline-block btn h6 py0 px1"
        rel="noopener noreferrer"
        >Linked in</a
      >
    </footer>
  </body>
</html>
