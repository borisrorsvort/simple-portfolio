<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>
    {% if page.title %}{{ page.title | escape }} | {{ site.title }}{% else %}{{
      site.title | escape
    }}{% endif %}
  </title>
  <meta name="author" content="{{ site.name }}" />
  <meta name="description" content="{{ site.description }}" />
  <meta
    property="og:title"
    content="{% if page.title %}{{ page.title | escape }} | {{
      site.title
    }}{% else %}{{ site.title | escape }}{% endif %}"
  />
  <meta
    property="og:url"
    content="{{ page.url | prepend: site.baseurl | prepend: site.url }}"
  />
  <meta property="og:site_name" content="{{ site.title }}" />
  <meta
    property="og:description"
    content="{% if page.description %}{{
      page.description | escape
    }}{% else %}{{ site.description }}{% endif %}"
  />
  <meta
    property="og:image"
    content="{% if page.image %}{{ page.image }}{% else %}{{
      site.default_img
    }}{% endif %}"
  />
  <meta property="og:type" content="blog" />

  <meta name="twitter:card" content="summary" />
  <meta
    name="twitter:description"
    content="{% if page.description %}{{
      page.description | escape
    }}{% else %}{{ site.description }}{% endif %}"
  />
  <meta
    name="twitter:title"
    content="{% if page.title %}{{ page.title | escape }} | {{
      site.title
    }}{% else %}{{ site.title | escape }}{% endif %}"
  />
  <meta
    name="twitter:url"
    content="{{ page.url | prepend: site.baseurl | prepend: site.url }}"
  />
  <meta name="twitter:site" content="{{ site.title }}" />
  <meta name="twitter:creator" content="@{{ site.twitter_username }}" />
  <meta name="twitter:domain" content="{{ site.url }}" />
  <meta
    property="twitter:image"
    content="{% if page.image %}{{ page.image }}{% else %}{{
      site.default_img
    }}{% endif %}"
  />
  <link
    href="https://unpkg.com/basscss@8.0.2/css/basscss.min.css"
    rel="stylesheet"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="{{ '/assets/css/main.css' | prepend: site.baseurl }}"
  />

  <link
    rel="alternate"
    type="application/rss+xml"
    title="{{ site.title }}"
    href="{{ '/feed.xml' | prepend: site.baseurl | prepend: site.url }}"
  />
  <link
    rel="canonical"
    href="{{ page.url | replace: 'index.html', '' | prepend: site.baseurl | prepend: site.url }}"
  />
  <script type="module" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8/dist/turbo.es2017-esm.js"></script>
  <script type="module">
    document.addEventListener('turbo:load', () => {
      const main = document.getElementById('main-content');
      if (main) { main.setAttribute('tabindex', '-1'); main.focus({ preventScroll: true }); }
    });
  </script>
</head>
