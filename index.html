---
layout: home-card
---

<div class="hcard">
  <div class="hcard__header">
    <div class="hcard__photo">
      <img
        src="{{ '/assets/images/boris-profile.jpg' | prepend: site.baseurl }}"
        alt="Boris Rorsvort"
        width="88"
        height="88"
      />
    </div>
  </div>

  <div class="hcard__body">
    <h1 class="hcard__name">Boris Rorsvort</h1>
    <p class="hcard__tagline">Design · Code · Teaching</p>
    <p class="hcard__bio">Nearly 20 years building apps end-to-end.
      Startup McGyver based in <strong>Brussels, Belgium</strong>.</p>

    <nav class="hcard__nav" aria-label="Categories">
      <a href="{{ '/design' | prepend: site.baseurl }}" class="hcard__cat hcard__cat--red">
        <img src="{{ '/assets/images/circle.svg' | prepend: site.baseurl }}" class="hcard__cat-shape" alt="" aria-hidden="true">
        <span class="hcard__cat-label">Design</span>
        <span class="hcard__cat-desc">UX &amp; interfaces</span>
      </a>
      <a href="{{ '/code' | prepend: site.baseurl }}" class="hcard__cat hcard__cat--yellow">
        <img src="{{ '/assets/images/square.svg' | prepend: site.baseurl }}" class="hcard__cat-shape" alt="" aria-hidden="true">
        <span class="hcard__cat-label">Code</span>
        <span class="hcard__cat-desc">Rails &amp; full-stack</span>
      </a>
      <a href="{{ '/teaching' | prepend: site.baseurl }}" class="hcard__cat hcard__cat--blue">
        <img src="{{ '/assets/images/triangle.svg' | prepend: site.baseurl }}" class="hcard__cat-shape" alt="" aria-hidden="true">
        <span class="hcard__cat-label">Teaching</span>
        <span class="hcard__cat-desc">Code, Art &amp; Culture</span>
      </a>
      <a href="{{ '/articles' | prepend: site.baseurl }}" class="hcard__cat hcard__cat--green">
        <img src="{{ '/assets/images/hexagone.svg' | prepend: site.baseurl }}" class="hcard__cat-shape" alt="" aria-hidden="true">
        <span class="hcard__cat-label">Blog</span>
        <span class="hcard__cat-desc">Tips &amp; thinking</span>
      </a>
    </nav>

    <div class="hcard__social">
      <a href="mailto:{{ site.email }}" class="hcard__social-link" aria-label="Email">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
      </a>
      <a href="https://github.com/{{ site.twitter_username }}" class="hcard__social-link" aria-label="GitHub" rel="noopener noreferrer">

  </div>
